name: Trading Bot Execution

on:
  schedule:
    - cron: '*/10 * * * 1-5' # Every 10 minutes, Mon-Fri
  workflow_dispatch: # Allows manual UI trigger

jobs:
  run-bot:
    runs-on: ubuntu-latest
    concurrency:
      group: trading-bot-main
      cancel-in-progress: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Cache virtualenv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --disable-pip-version-check --prefer-binary -r requirements.txt

      - name: Run Trading Bot
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MINUTE_STEP: "20"
          GEMINI_MAX_RETRIES_ON_429: "0"
          ONLY_WHEN_MARKET_OPEN: "true"
        run: .venv/bin/python main.py
