name: Trading Bot Execution

on:
  workflow_dispatch: # Allows manual UI trigger

permissions:
  contents: read

concurrency:
  group: trading-bot-main
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MINUTE_STEP: "20"
      GEMINI_MAX_RETRIES_ON_429: "0"
      ONLY_WHEN_MARKET_OPEN: "true"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --disable-pip-version-check --prefer-binary -r requirements.txt

      - name: Validate Alpaca secrets
        run: |
          test -n "$ALPACA_API_KEY" || (echo "Missing secret: ALPACA_API_KEY" && exit 1)
          test -n "$ALPACA_API_SECRET" || (echo "Missing secret: ALPACA_API_SECRET" && exit 1)

      - name: Check Alpaca market clock
        id: market-clock
        run: python scripts/check_market_open.py

      - name: Validate Gemini secret
        if: steps.market-clock.outputs.market_open == 'true'
        run: |
          test -n "$GEMINI_API_KEY" || (echo "Missing secret: GEMINI_API_KEY" && exit 1)

      - name: Run Trading Bot
        if: steps.market-clock.outputs.market_open == 'true'
        run: python main.py

      - name: Skip closed market run
        if: steps.market-clock.outputs.market_open != 'true'
        run: echo "Market is closed. Skipping bot run cleanly."

      - name: Upload trading logs
        if: always() && steps.market-clock.outputs.market_open == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: trading-bot-logs
          path: logs/
          if-no-files-found: ignore
